{num:9,title:"The Long Road — Supervision & Wellbeing",short:"PhD phases, supervisor relationship, difficult moments, wellbeing check-in, milestone planner.",tabs:["PhD Phases","Supervision","Difficult Moments","Wellbeing Check","Survival Strategies","Milestone Planner"],content:[
`<h2 class="sec-title">The PhD Journey</h2><p class="sec-intro">Understanding the typical phases helps you recognise that what you feel is normal.</p>
<div class="flow">
<div class="flow-step"><div class="flow-dot">1</div><div class="flow-body" onclick="tf(this)"><h4>Enthusiasm</h4><p>Everything feels possible and exciting.</p><div class="flow-detail">The temptation is to keep reading without narrowing. Enjoy the energy but start making decisions about scope.</div></div></div>
<div class="flow-step"><div class="flow-dot">2</div><div class="flow-body" onclick="tf(this)"><h4>Doubt</h4><p>The honeymoon ends — choosing means giving things up.</p><div class="flow-detail">Imposter syndrome often appears. Commit to a workable question, not the perfect one. Talk to your supervisor.</div></div></div>
<div class="flow-step"><div class="flow-dot">3</div><div class="flow-body" onclick="tf(this)"><h4>The Messy Middle</h4><p>Data collection, writing, rewriting — the long stretch.</p><div class="flow-detail">Progress is real but hard to see daily. Set small goals (300 words/day) and track progress visually.</div></div></div>
<div class="flow-step"><div class="flow-dot">4</div><div class="flow-body" onclick="tf(this)"><h4>Coming Together</h4><p>The pieces start to connect.</p><div class="flow-detail">Focus on coherence and argument, not perfection. Good enough and finished beats perfect and incomplete.</div></div></div>
<div class="flow-step"><div class="flow-dot">5</div><div class="flow-body" onclick="tf(this)"><h4>Finishing</h4><p>The final push and the strange grief of completion.</p><div class="flow-detail">Allow yourself rest after submission. You have produced original knowledge.</div></div></div>
</div>
<div class="tip"><strong>For our MA student:</strong> These phases apply in compressed form to your dissertation too.</div>`,
`<h2 class="sec-title">Working with Your Supervisor</h2><p class="sec-intro">The most important professional relationship of your doctoral career.</p>
<div class="card-grid">
<div class="card" onclick="tc(this)"><h3>What They Do</h3><p>Guide, challenge, support — not write your thesis.</p><div class="detail">They provide intellectual guidance, institutional support, and professional socialisation. The thesis is yours.</div></div>
<div class="card" onclick="tc(this)"><h3>Set Expectations Early</h3><p>Have the "how do we work" conversation in month one.</p><div class="detail">Meeting frequency, communication style, draft turnaround time, feedback format. Most frustrations stem from unspoken assumptions.</div></div>
<div class="card" onclick="tc(this)"><h3>Make Meetings Productive</h3><p>Send an agenda, take notes, follow up.</p><div class="detail">Ask specific questions. Send a brief summary of what was agreed afterwards.</div></div>
<div class="card" onclick="tc(this)"><h3>When Things Get Difficult</h3><p>Talk directly first. Escalate if needed.</p><div class="detail">Speak to your co-supervisor or graduate director if direct conversation fails. Changing supervisors is possible and sometimes necessary.</div></div>
</div>`,
`<h2 class="sec-title">Difficult Moments</h2><p class="sec-intro">Every doctoral journey includes crisis, doubt, or frustration. Recognising these situations makes them less paralysing.</p>
<div class="accordion">
<div class="acc-item" onclick="ta(this)"><div class="acc-header"><h4>Imposter Syndrome</h4><span class="arrow">▼</span></div><div class="acc-body">"Everyone else knows what they're doing." The feeling is real; the belief is false. You were admitted because qualified people found your work promising. Track your accomplishments to counter it.</div></div>
<div class="acc-item" onclick="ta(this)"><div class="acc-header"><h4>Writer's Block</h4><span class="arrow">▼</span></div><div class="acc-body">Usually about thinking, not writing. Lower the bar: write badly on purpose. Write as if explaining to a friend. Separate writing from editing.</div></div>
<div class="acc-item" onclick="ta(this)"><div class="acc-header"><h4>Comparison with Peers</h4><span class="arrow">▼</span></div><div class="acc-body">PhDs are not races. Different projects have different timelines. The only meaningful comparison: where you are now vs. six months ago.</div></div>
<div class="acc-item" onclick="ta(this)"><div class="acc-header"><h4>Burnout</h4><span class="arrow">▼</span></div><div class="acc-body">Not laziness — the result of sustained overwork without recovery. Rest is not a reward for productivity; it is a prerequisite. If exhaustion persists, speak to a counsellor.</div></div>
</div>`,
`<h2 class="sec-title">Wellbeing Check-In</h2><p class="sec-intro">A private reflection tool. Nothing is recorded or shared.</p>
<div id="wbChecks"></div>
<div class="btn-row" style="justify-content:center;"><button class="btn-p" onclick="wbReflect()" style="background:#4a90d9;">Reflect</button><button class="btn-s" onclick="wbReset()">Reset</button></div>
<div class="output" id="wbOut"></div>
<div class="warn" style="margin-top:.8rem;"><strong>Important:</strong> This is self-reflection, not clinical assessment. If you are struggling, please reach out to a counsellor.</div>`,
`<h2 class="sec-title">Survival Strategies</h2><p class="sec-intro">Simple habits that, practised consistently, make the difference between finishing and not finishing.</p>
<div class="accordion">
<div class="acc-item" onclick="ta(this)"><div class="acc-header"><h4>Write Every Day</h4><span class="arrow">▼</span></div><div class="acc-body">30–60 minutes, before email. Even 200 words/day = 73,000 words/year. A thesis is built sentence by sentence.</div></div>
<div class="acc-item" onclick="ta(this)"><div class="acc-header"><h4>Track Progress Visually</h4><span class="arrow">▼</span></div><div class="acc-body">A simple chart of daily word count. When you feel stuck, look at the chart — progress is usually larger than you think.</div></div>
<div class="acc-item" onclick="ta(this)"><div class="acc-header"><h4>Set Boundaries</h4><span class="arrow">▼</span></div><div class="acc-body">Decide when you work and when you don't. Rest is productive.</div></div>
<div class="acc-item" onclick="ta(this)"><div class="acc-header"><h4>Find Your People</h4><span class="arrow">▼</span></div><div class="acc-body">2–3 peers who understand. Meet regularly. The four of you in this seminar share a rare experience — support each other.</div></div>
<div class="acc-item" onclick="ta(this)"><div class="acc-header"><h4>Move Your Body</h4><span class="arrow">▼</span></div><div class="acc-body">Exercise reduces anxiety, improves sleep, and enhances concentration. Schedule it like a meeting.</div></div>
</div>`,
`<h2 class="sec-title">Milestone Planner</h2><p class="sec-intro">Break your thesis into manageable milestones.</p>
<div class="ms-row"><input type="text" id="msT" placeholder="Task (e.g., Complete lit review)"><input type="date" id="msD"><select id="msP"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select><button class="btn-p" onclick="addMs()">+ Add</button></div>
<div id="msList"></div>
<div class="progress-bar" id="msBar" style="display:none;"><div class="progress-fill" id="msFill" style="width:0%;">0%</div></div>
<div class="btn-row"><button class="btn-s" onclick="copyMs()">Copy Plan</button><button class="btn-s" onclick="clearMs()">Clear</button></div>`
]},

{num:10,title:"Show and Tell — Presenting & Looking Ahead",short:"Final presentation structure, peer feedback, career paths, viva guide, seminar reflection.",tabs:["Presentation Structure","Outline Builder","Peer Feedback","Looking Ahead","The Viva","Reflection"],content:[
`<h2 class="sec-title">Structuring Your Final Presentation</h2><p class="sec-intro">15 minutes to present, followed by questions and peer feedback. Here's how to make those minutes count.</p>
<div class="flow">
<div class="flow-step"><div class="flow-dot">1</div><div class="flow-body" onclick="tf(this)"><h4>The Hook (2 min)</h4><p>Grab attention, state your puzzle.</p><div class="flow-detail">Do not begin with "In this presentation I will..." Start with the puzzle. A concrete example or surprising statistic. End with your research question in one sentence.</div></div></div>
<div class="flow-step"><div class="flow-dot">2</div><div class="flow-body" onclick="tf(this)"><h4>Context (3 min)</h4><p>Position your work — briefly.</p><div class="flow-detail">"The existing literature says X; I argue Y because Z." That's all the audience needs.</div></div></div>
<div class="flow-step"><div class="flow-dot">3</div><div class="flow-body" onclick="tf(this)"><h4>Argument (3 min)</h4><p>State your claim clearly.</p><div class="flow-detail">The audience should leave able to summarise your argument in one sentence.</div></div></div>
<div class="flow-step"><div class="flow-dot">4</div><div class="flow-body" onclick="tf(this)"><h4>Evidence (4 min)</h4><p>Your strongest evidence.</p><div class="flow-detail">One well-chosen example is worth more than a flood of information. Be transparent about limitations.</div></div></div>
<div class="flow-step"><div class="flow-dot">5</div><div class="flow-body" onclick="tf(this)"><h4>Conclusion (3 min)</h4><p>Restate, reflect, invite feedback.</p><div class="flow-detail">Tell the audience what feedback you need: "I'm particularly interested in your thoughts on my case selection."</div></div></div>
</div>`,
`<h2 class="sec-title">Outline Builder</h2><p class="sec-intro">Draft your presentation structure here.</p>
<div class="builder">
<label>Title</label><input type="text" id="ob1" placeholder="Your presentation title">
<label>Hook (2–3 sentences)</label><textarea id="ob2" placeholder="Opening puzzle or question"></textarea>
<label>Research Question</label><textarea id="ob3" placeholder="One clear sentence" style="min-height:45px;"></textarea>
<label>Context & Literature</label><textarea id="ob4" placeholder="Key debate and gap (3–4 sentences)"></textarea>
<label>Your Argument</label><textarea id="ob5" placeholder="Your central claim (2–3 sentences)"></textarea>
<label>Method & Evidence</label><textarea id="ob6" placeholder="Cases, data, key findings"></textarea>
<label>Limitations</label><textarea id="ob7" placeholder="Main limitations" style="min-height:40px;"></textarea>
<label>Feedback Needed</label><textarea id="ob8" placeholder="What feedback do you want?" style="min-height:40px;"></textarea>
<div class="btn-row"><button class="btn-p" onclick="genOB()">Generate Outline</button><button class="btn-s" onclick="copyO('obOut')">Copy</button></div>
<div class="output" id="obOut"></div>
</div>`,
`<h2 class="sec-title">Peer Feedback</h2><p class="sec-intro">Use this to provide structured feedback on peers' presentations.</p>
<div class="builder">
<label>Presenter</label><input type="text" id="pf0" placeholder="Name">
<label>Research Question — clear and significant?</label><textarea id="pf1" placeholder="Feedback..." style="min-height:45px;"></textarea>
<label>Argument — convincing?</label><textarea id="pf2" placeholder="Feedback..." style="min-height:45px;"></textarea>
<label>Method — appropriate?</label><textarea id="pf3" placeholder="Feedback..." style="min-height:45px;"></textarea>
<label>Presentation — clear, well-timed?</label><textarea id="pf4" placeholder="Feedback..." style="min-height:45px;"></textarea>
<label>Key Strengths</label><textarea id="pf5" placeholder="What worked well?"></textarea>
<label>Key Suggestions</label><textarea id="pf6" placeholder="2–3 specific improvements"></textarea>
<div class="btn-row"><button class="btn-p" onclick="genPF()">Generate Report</button><button class="btn-s" onclick="copyO('pfOut')">Copy</button></div>
<div class="output" id="pfOut"></div>
</div>`,
`<h2 class="sec-title">Looking Ahead</h2><p class="sec-intro">The seminar ends, but your journey continues. Here are the paths ahead.</p>
<div class="card-grid">
<div class="path-card" onclick="this.classList.toggle('open')"><h3>The Academic Path</h3><p>Postdocs, lectureships, tenure track.</p><div class="path-detail">Competition is intense. Publications, teaching experience, conference presentations, a clear research agenda, and strong references distinguish successful candidates. Start building now.</div></div>
<div class="path-card" onclick="this.classList.toggle('open')"><h3>Policy & International Orgs</h3><p>Think tanks, UN, EU, NGOs, government.</p><div class="path-detail">Values analytical skills, area expertise, languages, and clear communication. Build a LinkedIn presence and write occasional policy briefs.</div></div>
<div class="path-card" onclick="this.classList.toggle('open')"><h3>Consultancy & Private Sector</h3><p>Political risk, strategic analysis.</p><div class="path-detail">Firms like Control Risks, Eurasia Group value your ability to analyse complex situations and write clearly.</div></div>
<div class="path-card" onclick="this.classList.toggle('open')"><h3>Public Scholarship</h3><p>Writing for wider audiences, media, commentary.</p><div class="path-detail">Foreign Affairs, The Conversation, podcasts. The skills from this seminar — clear writing, structured argument — are exactly what this requires.</div></div>
<div class="path-card" onclick="this.classList.toggle('open')"><h3>The Portfolio Career</h3><p>Combining roles — increasingly the norm.</p><div class="path-detail">Part teaching, part research, part consultancy. The PhD's versatile skills — analysis, project management, communication — transfer everywhere.</div></div>
</div>
<div class="highlight" style="margin-top:1rem;"><h3>Next Six Months</h3><p>Submit one abstract. Revise one piece of writing. Update your profiles. Schedule writing time. Stay in touch with peers. Meet your supervisor to set milestones.</p></div>`,
`<h2 class="sec-title">The Viva / Defence</h2><p class="sec-intro">The final oral examination — a sustained conversation about your work with scholars who have read it carefully.</p>
<div class="accordion">
<div class="acc-item" onclick="ta(this)"><div class="acc-header"><h4>What Is a Viva?</h4><span class="arrow">▼</span></div><div class="acc-body">1–3 hour oral exam. Internal and external examiners question you. Not hostile — scholarly conversation. Outcomes: pass, minor corrections, major corrections, or (rarely) referral.</div></div>
<div class="acc-item" onclick="ta(this)"><div class="acc-header"><h4>How to Prepare</h4><span class="arrow">▼</span></div><div class="acc-body">Re-read your thesis. Anticipate questions. Practise aloud. Know the examiners' work.</div></div>
<div class="acc-item" onclick="ta(this)"><div class="acc-header"><h4>Common Questions</h4><span class="arrow">▼</span></div><div class="acc-body">Summarise in 3–5 minutes. Original contribution? Why this method? Limitations? What would you change? Policy implications? Where next?</div></div>
<div class="acc-item" onclick="ta(this)"><div class="acc-header"><h4>On the Day</h4><span class="arrow">▼</span></div><div class="acc-body">Arrive early. Bring annotated thesis. Think before speaking. Ask for clarification. Admit when unsure.</div></div>
</div>
<div class="tip"><strong>For our MA student:</strong> Your defence will be shorter and less formal, but the principles are identical.</div>`,
`<h2 class="sec-title">Seminar Reflection</h2><p class="sec-intro">Reflect on the ten weeks. Share in the Module 10 Teams channel if comfortable.</p>
<div class="reflect-grid">
<div class="reflect-card"><h4>Most Valuable Insight</h4><textarea id="rf1" placeholder="The most useful thing you learned..."></textarea></div>
<div class="reflect-card"><h4>How Your Research Changed</h4><textarea id="rf2" placeholder="Has your question, method, or framing shifted?"></textarea></div>
<div class="reflect-card"><h4>Skills Developed</h4><textarea id="rf3" placeholder="Writing, presenting, reading critically..."></textarea></div>
<div class="reflect-card"><h4>What You Still Need</h4><textarea id="rf4" placeholder="Gaps remaining..."></textarea></div>
<div class="reflect-card"><h4>Goal: Next Three Months</h4><textarea id="rf5" placeholder="One concrete goal..."></textarea></div>
<div class="reflect-card"><h4>Message to Peers</h4><textarea id="rf6" placeholder="Anything to say to the group..."></textarea></div>
</div>
<div class="btn-row" style="justify-content:center;"><button class="btn-p" onclick="genRef()">Generate</button><button class="btn-s" onclick="copyO('rfOut')">Copy</button></div>
<div class="output" id="rfOut"></div>
<div class="highlight" style="margin-top:1rem;"><h3>Thank You</h3><p>This seminar was built around the idea that doctoral research is a human endeavour as much as an intellectual one. The four of you share something that will connect you long after this course ends. Stay in touch, support each other, and remember: the best research is done by people who take care of themselves and each other.</p></div>`
]}
];

/* ═══════════════════════════════════════
   RENDERING ENGINE
   ═══════════════════════════════════════ */

// Home screen module list
const ml = document.getElementById('moduleList');
M.forEach((m,i)=>{
  ml.innerHTML += `<div class="module-btn" onclick="openModule(${i})"><div class="num">${m.num}</div><div class="info"><h3>${m.title}</h3><p>${m.short}</p></div><div class="chevron">›</div></div>`;
});

// Build module views
const mc = document.getElementById('moduleContainer');
M.forEach((m,i)=>{
  let nav = m.tabs.map((t,j)=>`<button class="${j===0?'active':''}" onclick="showSec(${i},${j})">${t}</button>`).join('');
  let secs = m.content.map((c,j)=>`<div class="section ${j===0?'active':''}" id="sec_${i}_${j}">${c}</div>`).join('');
  mc.innerHTML += `<div class="module-view" id="mod_${i}"><div class="mod-nav" id="nav_${i}">${nav}</div><div class="mod-content">${secs}</div></div>`;
});

/* ═══ Navigation ═══ */
function openModule(i){
  document.getElementById('home').style.display='none';
  document.querySelectorAll('.module-view').forEach(v=>v.classList.remove('active'));
  document.getElementById('mod_'+i).classList.add('active');
  document.getElementById('topTitle').textContent = 'Module '+M[i].num+' – '+M[i].title;
  document.getElementById('backBtn').style.display='block';
  window.scrollTo(0,0);
  // Init dynamic content
  if(i===5) initEthGame();
  if(i===7) initProfile();
  if(i===8) initWb();
}

function goHome(){
  document.querySelectorAll('.module-view').forEach(v=>v.classList.remove('active'));
  document.getElementById('home').style.display='block';
  document.getElementById('topTitle').textContent='INTL698 – Doctoral Seminar';
  document.getElementById('backBtn').style.display='none';
  window.scrollTo(0,0);
}

function showSec(mod,sec){
  document.querySelectorAll(`#mod_${mod} .section`).forEach(s=>s.classList.remove('active'));
  document.getElementById(`sec_${mod}_${sec}`).classList.add('active');
  document.querySelectorAll(`#nav_${mod} button`).forEach((b,j)=>b.classList.toggle('active',j===sec));
}

/* ═══ Toggle helpers ═══ */
function tc(el){el.classList.toggle('open');}
function ta(el){el.classList.toggle('open');}
function tf(el){el.classList.toggle('open');}

/* ═══ Copy helper ═══ */
function copyO(id){
  const el=document.getElementById(id);
  const text=el.value||el.textContent;
  if(!text){alert('Nothing to copy yet.');return;}
  navigator.clipboard.writeText(text).then(()=>alert('Copied!')).catch(()=>{const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);alert('Copied!');});
}

/* ═══ Clear helper ═══ */
function clr(ids,outId){
  ids.forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  if(outId){const o=document.getElementById(outId);o.textContent='';o.classList.remove('show');}
}

/* ═══ Module 2 — RQ Builder ═══ */
function genRQ(){
  const v=id=>document.getElementById(id).value.trim();
  if(!v('rq4')){alert('Please enter a research question.');return;}
  let t=`RESEARCH QUESTION SUMMARY\n\nTopic: ${v('rq1')||'[Not specified]'}\nPuzzle: ${v('rq2')||'[Not specified]'}\nLiterature gap: ${v('rq3')||'[Not specified]'}\n\nRESEARCH QUESTION:\n${v('rq4')}\n\nType: ${v('rq5')||'[Not specified]'}`;
  const o=document.getElementById('rqOut');o.textContent=t;o.classList.add('show');
}

/* ═══ Module 3 — Method Finder ═══ */
function findMethod(){
  const k=document.getElementById('mf1').value;
  const n=document.getElementById('mf2').value;
  const m=document.getElementById('mf3').value;
  if(!k||!n||!m){alert('Please answer all three questions.');return;}
  let suggestions=[];
  if(k==='causal'&&n==='one') suggestions.push('Process Tracing — trace the causal mechanism step by step within a single case.');
  if(k==='causal'&&n==='few') suggestions.push('Comparative Case Study (Most-Similar/Most-Different Design) — isolate causal factors across cases.');
  if(k==='causal'&&n==='many') suggestions.push('Statistical / Large-N Analysis — test causal hypotheses across many cases.');
  if(k==='meaning') suggestions.push('Discourse Analysis or Interpretive Interview Study — explore how actors construct meaning.');
  if(k==='pattern') suggestions.push('Large-N or Survey Research — identify regularities and distributions.');
  if(k==='process') suggestions.push('Process Tracing — reconstruct the sequence of events and decisions.');
  if(m==='people') suggestions.push('Semi-Structured Interviews and/or Ethnography — access insider perspectives.');
  if(m==='texts') suggestions.push('Document / Archival Analysis — systematic reading of primary sources.');
  if(m==='mixed') suggestions.push('Mixed Methods — combine quantitative breadth with qualitative depth.');
  if(n==='few'&&m==='texts') suggestions.push('Comparative Historical Analysis — structured comparison of documentary evidence.');
  const o=document.getElementById('mfOut');o.textContent='SUGGESTED METHODS:\n\n'+[...new Set(suggestions)].map((s,i)=>`${i+1}. ${s}`).join('\n\n');o.classList.add('show');
}

/* ═══ Module 4 — Bibliography ═══ */
let bibEntries=[];
function addBib(){
  const ref=document.getElementById('bib1').value.trim();
  if(!ref){alert('Enter a reference.');return;}
  bibEntries.push({ref,arg:document.getElementById('bib2').value.trim(),meth:document.getElementById('bib3').value.trim(),rel:document.getElementById('bib4').value.trim()});
  ['bib1','bib2','bib3','bib4'].forEach(id=>document.getElementById(id).value='');
  renderBib();
}
function renderBib(){
  const o=document.getElementById('bibOut');
  if(!bibEntries.length){o.classList.remove('show');return;}
  o.textContent=`ANNOTATED BIBLIOGRAPHY (${bibEntries.length} sources)\n\n`+bibEntries.map((b,i)=>`${i+1}. ${b.ref}\n   Argument: ${b.arg||'-'}\n   Method: ${b.meth||'-'}\n   Relevance: ${b.rel||'-'}`).join('\n\n');
  o.classList.add('show');
}
function clearBib(){bibEntries=[];renderBib();}

/* ═══ Module 5 — Word Count ═══ */
function weCnt(){
  const t=document.getElementById('we1').value.trim();
  const w=t?t.split(/\s+/).length:0;
  const s=t?(t.match(/[.!?]+/g)||[]).length:0;
  document.getElementById('weStat').textContent=`Words: ${w} | Sentences: ~${s}`;
}

/* ═══ Module 6 — Ethics Game ═══ */
const ethScenarios=[
  {text:"You find a perfect summary in a classmate's paper. You want to use it.",opts:[{l:"Copy it, cite the original sources only.",c:false,f:"The summary itself was written by your classmate. Cite both the originals AND your classmate, and paraphrase."},{l:"Paraphrase and cite both original sources and your classmate.",c:true,f:"Correct. Original ideas need original citations; your classmate's synthesis needs acknowledgment too."},{l:"Quote it and cite only your classmate.",c:false,f:"The original ideas still need their original citations."}]},
  {text:"An interviewee becomes visibly distressed during your interview.",opts:[{l:"Continue — they signed consent.",c:false,f:"Consent is ongoing. A signed form doesn't override current wellbeing."},{l:"Pause, check on them, offer to stop or reschedule.",c:true,f:"Correct. Wellbeing always takes priority over data collection."},{l:"Skip to easier questions and finish quickly.",c:false,f:"This prioritises your data over the participant's state."}]},
  {text:"Your statistical results only become significant if you remove three outliers.",opts:[{l:"Remove them and report the significant result.",c:false,f:"Removing cases solely to get significance is data manipulation."},{l:"Report both analyses transparently.",c:true,f:"Correct. Transparency is key. Present both and explain your reasoning."},{l:"Only report the non-significant full result.",c:false,f:"Honest, but you miss the richer discussion. Report both."}]},
  {text:"You used AI to substantially rewrite a section of your literature review.",opts:[{l:"No disclosure needed — the ideas are mine.",c:false,f:"The expression is substantially the AI's. Your degree assesses your writing ability."},{l:"Disclose AI use, then rewrite the section yourself.",c:true,f:"Correct. Use the AI draft as a guide, write it yourself, disclose."},{l:"Fine if you check for accuracy.",c:false,f:"Accuracy is necessary but not sufficient. The authorship concern remains."}]}
];
let ethIdx=0,ethScore=0,ethTotal=0;
function initEthGame(){
  ethIdx=0;ethScore=0;ethTotal=0;
  renderEth();
}
function renderEth(){
  const box=document.getElementById('ethGame');
  if(ethIdx>=ethScenarios.length){
    box.innerHTML=`<p style="font-size:.9rem;color:#d0d0e0;">Game complete. Score: <strong>${ethScore}/${ethScenarios.length}</strong>.</p><div class="btn-row"><button class="btn-p" onclick="initEthGame()">Play Again</button></div>`;
    return;
  }
  const s=ethScenarios[ethIdx];
  box.innerHTML=`<p style="font-size:.82rem;color:#888;margin-bottom:.5rem;">Scenario ${ethIdx+1} of ${ethScenarios.length}</p><div class="scenario-text">${s.text}</div>${s.opts.map((o,i)=>`<button class="opt-btn" onclick="ethPick(${i})">${o.l}</button>`).join('')}<div class="feedback" id="ethFb"></div><div class="btn-row" id="ethNav" style="display:none;"><button class="btn-p" onclick="ethIdx++;renderEth()">Next →</button></div>`;
}
function ethPick(i){
  const s=ethScenarios[ethIdx];
  document.querySelectorAll('#ethGame .opt-btn').forEach((b,j)=>{b.classList.add('disabled');if(s.opts[j].c)b.classList.add('correct');else if(j===i)b.classList.add('wrong');});
  const fb=document.getElementById('ethFb');
  fb.className=`feedback show ${s.opts[i].c?'good':'bad'}`;
  fb.textContent=s.opts[i].f;
  if(s.opts[i].c)ethScore++;
  ethTotal++;
  document.getElementById('ethNav').style.display='block';
}

/* ═══ Module 7 — Abstract Builder ═══ */
function abCnt(){
  const ids=['ab1','ab2','ab3','ab4','ab5','ab6'];
  const w=ids.reduce((s,id)=>{const v=document.getElementById(id).value.trim();return s+(v?v.split(/\s+/).length:0);},0);
  const el=document.getElementById('abWc');
  el.textContent=`Words: ${w} / 250`;
  el.style.color=w>250?'#e94560':w>=200?'#4caf50':'#888';
}
function genAb(){
  const v=id=>document.getElementById(id).value.trim();
  if(!v('ab3')){alert('Enter at least a research question.');return;}
  let t=[v('ab1'),v('ab2'),v('ab3'),v('ab4'),v('ab5'),v('ab6')].filter(Boolean).join(' ');
  const o=document.getElementById('abOut');o.textContent=t;o.classList.add('show');
}

/* ═══ Module 8 — Profile Checklist ═══ */
const profiles=[
  {name:'ORCID',desc:'Permanent researcher ID — orcid.org'},
  {name:'Google Scholar',desc:'Auto-tracks citations — scholar.google.com'},
  {name:'LinkedIn',desc:'Academic + professional visibility'},
  {name:'ResearchGate',desc:'Upload papers, follow peers'},
  {name:'Academia.edu',desc:'Additional discoverability'},
  {name:'Personal Webpage',desc:'One page: name, research, CV, contact'}
];
function initProfile(){
  const el=document.getElementById('profileChecks');
  if(el.innerHTML) return;
  el.innerHTML=profiles.map(p=>`<div class="check-item" onclick="this.classList.toggle('checked');updProf()"><div class="check-box"></div><div class="check-label"><h4>${p.name}</h4><p>${p.desc}</p></div></div>`).join('');
}
function updProf(){
  const t=profiles.length;
  const c=document.querySelectorAll('#profileChecks .check-item.checked').length;
  const f=document.getElementById('profProg');
  f.style.width=Math.round(c/t*100)+'%';
  f.textContent=`${c} / ${t}`;
}

/* ═══ Module 9 — Wellbeing ═══ */
const wbDims=[{id:'wbMot',name:'Motivation',lo:'Very low',hi:'Very high'},{id:'wbProg',name:'Progress',lo:'Stuck',hi:'On track'},{id:'wbSup',name:'Supervisor',lo:'Struggling',hi:'Excellent'},{id:'wbBal',name:'Work-Life Balance',lo:'All work',hi:'Balanced'},{id:'wbSoc',name:'Social Connection',lo:'Isolated',hi:'Connected'},{id:'wbAll',name:'Overall Wellbeing',lo:'Struggling',hi:'Thriving'}];
function initWb(){
  const el=document.getElementById('wbChecks');
  if(el.innerHTML) return;
  el.innerHTML=wbDims.map(d=>`<div class="wb-card"><h4>${d.name}</h4><div class="wb-row"><input type="range" class="wb-slider" id="${d.id}" min="1" max="10" value="5" oninput="this.nextElementSibling.textContent=this.value"><span class="wb-val">5</span></div><div style="display:flex;justify-content:space-between;font-size:.68rem;color:#555;"><span>${d.lo}</span><span>${d.hi}</span></div></div>`).join('');
}
function wbReflect(){
  const vals=wbDims.map(d=>parseInt(document.getElementById(d.id).value));
  const avg=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
  const low=[],high=[];
  vals.forEach((v,i)=>{if(v<=3)low.push(wbDims[i].name);if(v>=8)high.push(wbDims[i].name);});
  let t=`WELLBEING REFLECTION\n\nAverage: ${avg} / 10\n`;
  if(high.length) t+=`\nStrengths: ${high.join(', ')}\n`;
  if(low.length) t+=`\nNeeds attention: ${low.join(', ')}\n`;
  t+=avg>=7?'\nYou seem in a good place. Protect what is working.':avg>=4.5?'\nMixed — focus on the lowest area. One small change this week.':'\nYou may be going through a difficult period. Please talk to someone you trust.';
  const o=document.getElementById('wbOut');o.textContent=t;o.classList.add('show');
}
function wbReset(){
  wbDims.forEach(d=>{const s=document.getElementById(d.id);if(s){s.value=5;s.nextElementSibling.textContent='5';}});
  const o=document.getElementById('wbOut');o.textContent='';o.classList.remove('show');
}

/* ═══ Module 9 — Milestones ═══ */
let msList=[];
function addMs(){
  const task=document.getElementById('msT').value.trim();
  if(!task){alert('Enter a task.');return;}
  msList.push({task,date:document.getElementById('msD').value,pri:document.getElementById('msP').value,done:false,id:Date.now()});
  document.getElementById('msT').value='';
  renderMs();
}
function renderMs(){
  const el=document.getElementById('msList');
  el.innerHTML=msList.map(m=>`<div class="ms-item ${m.done?'done':''}" onclick="toggleMs(${m.id})"><div class="check-box" style="width:18px;height:18px;border:2px solid #e94560;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;${m.done?'background:#e94560;':''}"><span style="color:#fff;font-size:.7rem;${m.done?'':'opacity:0;'}">✓</span></div><h4>${m.task}<span class="ms-pri ${m.pri}">${m.pri}</span></h4><span class="ms-del" onclick="event.stopPropagation();delMs(${m.id})">✕</span></div>`).join('');
  const bar=document.getElementById('msBar');
  if(msList.length){
    bar.style.display='block';
    const d=msList.filter(m=>m.done).length;
    const p=Math.round(d/msList.length*100);
    const f=document.getElementById('msFill');f.style.width=p+'%';f.textContent=`${d}/${msList.length}`;
  } else bar.style.display='none';
}
function toggleMs(id){const m=msList.find(x=>x.id===id);if(m)m.done=!m.done;renderMs();}
function delMs(id){msList=msList.filter(x=>x.id!==id);renderMs();}
function clearMs(){msList=[];renderMs();}
function copyMs(){
  if(!msList.length){alert('Add milestones first.');return;}
  const t='MILESTONE PLAN\n\n'+msList.map((m,i)=>`${i+1}. [${m.done?'✓':'○'}] ${m.task} (${m.pri}) ${m.date||''}`).join('\n');
  navigator.clipboard.writeText(t).then(()=>alert('Copied!')).catch(()=>{});
}

/* ═══ Module 10 — Outline Builder ═══ */
function genOB(){
  const v=id=>document.getElementById(id).value.trim();
  if(!v('ob3')){alert('Enter at least a research question.');return;}
  let t=`PRESENTATION OUTLINE\n\n`;
  t+=`Title: ${v('ob1')||'[Untitled]'}\n\n`;
  t+=`1. HOOK\n${v('ob2')||'[Your opening]'}\n\n`;
  t+=`2. RESEARCH QUESTION\n${v('ob3')}\n\n`;
  t+=`3. CONTEXT\n${v('ob4')||'[Literature positioning]'}\n\n`;
  t+=`4. ARGUMENT\n${v('ob5')||'[Your claim]'}\n\n`;
  t+=`5. METHOD & EVIDENCE\n${v('ob6')||'[Your approach]'}\n\n`;
  t+=`6. LIMITATIONS\n${v('ob7')||'[Main limitations]'}\n\n`;
  t+=`7. FEEDBACK NEEDED\n${v('ob8')||'[What feedback?]'}`;
  const o=document.getElementById('obOut');o.textContent=t;o.classList.add('show');
}

/* ═══ Module 10 — Peer Feedback ═══ */
function genPF(){
  const v=id=>document.getElementById(id).value.trim();
  let t=`PEER FEEDBACK — ${v('pf0')||'Presenter'}\n\n`;
  t+=`Research Question: ${v('pf1')||'-'}\nArgument: ${v('pf2')||'-'}\nMethod: ${v('pf3')||'-'}\nPresentation: ${v('pf4')||'-'}\n\nStrengths: ${v('pf5')||'-'}\nSuggestions: ${v('pf6')||'-'}`;
  const o=document.getElementById('pfOut');o.textContent=t;o.classList.add('show');
}

/* ═══ Module 10 — Reflection ═══ */
function genRef(){
  const fields=[{id:'rf1',l:'Most Valuable Insight'},{id:'rf2',l:'How Research Changed'},{id:'rf3',l:'Skills Developed'},{id:'rf4',l:'What I Still Need'},{id:'rf5',l:'Goal: Next 3 Months'},{id:'rf6',l:'Message to Peers'}];
  let t='INTL698 SEMINAR REFLECTION\n\n';
  let has=false;
  fields.forEach(f=>{const v=document.getElementById(f.id).value.trim();if(v){t+=`${f.l.toUpperCase()}\n${v}\n\n`;has=true;}});
  if(!has){alert('Fill in at least one field.');return;}
  const o=document.getElementById('rfOut');o.textContent=t;o.classList.add('show');
}

/* ═══ PWA Install ═══ */
let deferredPrompt;
const banner=document.getElementById('installBanner');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;if(!sessionStorage.getItem('dismissed'))banner.classList.add('show');});
document.getElementById('installBtn').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;banner.classList.remove('show');});
document.getElementById('dismissBtn').addEventListener('click',()=>{banner.classList.remove('show');sessionStorage.setItem('dismissed','1');});

/* ═══ Online/Offline ═══ */
function updStatus(){
  const d=document.getElementById('statusDot');
  d.className='status '+(navigator.onLine?'':'offline');
}
window.addEventListener('online',updStatus);
window.addEventListener('offline',updStatus);
updStatus();

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

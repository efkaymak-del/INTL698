function el(id){ return document.getElementById(id); }

function buildNav(){
  var nav = el("topnav");

function showTab(id){

  for(var i=0; i<btns.length; i++){
    btns[i].className = btns[i].id === "nav-" + id ? "active" : "";

  el("app").innerHTML = getTabContent(id);
}

function getTabContent(id){
  if(id === "conferences") return buildConferences();

  if(id === "networking") return buildNetworking();
  if(id === "publishing") return buildPublishing();

/* ---------- TAB 1: CONFERENCE SELECTOR ---------- */

  h += '<option value="yes">ECPR-funded only</option>';
  h += '</select>';
  h += '<div id="conf-results"></div></div>';

  h += '<div class="card"><h2>Virtual and Low-Cost Alternatives</h2>';
  h += '<p>Not every career-building activity requires expensive travel. Consider these alternatives:</p>';
  h += '<h3>Virtual Conferences</h3>';
  h += '<p><strong>ISA Virtual (Jul/Aug each year)</strong> offers the same scholarly rigor as the annual convention at a fraction of the cost (USD 50-100, no travel). The MPSA Political Science Research Exchange is another online-only option.</p>';

  h += '<p>Workshops like <strong>EISA EWIS</strong> and <strong>ECPR Joint Sessions</strong> provide deeper engagement with fewer participants. You present a full paper and receive detailed written feedback. These are often more valuable for a work-in-progress than a 15-minute panel slot at a mega-conference.</p>';
  h += '<h3>Think-Tank and Policy Events</h3>';
  h += '<p>Organizations like <a href="https://www.chathamhouse.org/events" target="_blank">Chatham House</a>, <a href="https://www.csis.org/events" target="_blank">CSIS</a>, and regional think tanks host events (often free or low-cost, sometimes virtual) that connect academic research with policy communities.</p>';
  h += '<h3>Graduate Symposia</h3>';
  h += '<p>Many departments and regional associations organize graduate-only conferences with minimal fees. These are low-stakes environments to practice presenting and receive peer feedback (e.g., MPSA Graduate Symposium, Pi Sigma Alpha Student Research Conference).</p>';
  h += '</div>';

  h += '<div class="card"><h2>Methods Schools</h2>';
  h += '<p>Dedicated methods training is a strategic investment that strengthens your dissertation and CV simultaneously.</p>';
  h += '<table><tr><th>Program</th><th>When</th><th>Focus</th><th>Cost</th><th>Notes</th></tr>';

    var m = METHODS_SCHOOLS[i];
    h += '<tr><td><a href="' + m.url + '" target="_blank">' + m.name + '</a></td><td>' + m.when + '</td><td>' + m.focus + '</td><td>' + m.cost + '</td><td>' + m.notes + '</td></tr>';
  }
  h += '</table></div>';
  return h;
}

function filterConfs(){
  var budget = el("conf-budget").value;
  var format = el("conf-format").value;
  var ecpr = el("conf-ecpr").value;
  var results = [];
  for(var i=0; i<CONFERENCES.length; i++){
    var c = CONFERENCES[i];
    if(ecpr === "yes" && !c.ecpr) continue;
    if(format === "virtual" && c.location !== "Online") continue;
    if(format === "workshop" && c.size.replace(/[^0-9]/g,"") > 1000) continue;
    if(format === "large" && c.size.replace(/[^0-9]/g,"") < 1000 && c.location !== "Online") continue;
    var costNum = parseInt(c.cost.replace(/[^0-9]/g,""));
    if(budget === "low" && costNum > 200) continue;
    if(budget === "mid" && (costNum < 150 || costNum > 400)) continue;
    if(budget === "high" && costNum < 300) continue;
    results.push(c);
  }
  var h = "";
  if(results.length === 0){
    h = '<p style="margin-top:12px;color:#856404;">No conferences match your filters. Try broadening your criteria.</p>';
  } else {
    h = '<table style="margin-top:12px;"><tr><th>Conference</th><th>Frequency</th><th>Size</th><th>Cost</th><th>Character</th><th>Tips</th></tr>';
    for(var j=0; j<results.length; j++){
      var r = results[j];
      var ecprTag = r.ecpr ? ' <span class="tag tag-green">ECPR Funded</span>' : '';
      h += '<tr><td><a href="' + r.url + '" target="_blank">' + r.name + '</a>' + ecprTag + '</td><td>' + r.freq + '</td><td>' + r.size + '</td><td>' + r.cost + '</td><td>' + r.character + '</td><td>' + r.tips + '</td></tr>';
    }
    h += '</table>';
  }
  el("conf-results").innerHTML = h;
}

    if(q && searchStr.indexOf(q) === -1) continue;
    var link = f.url ? '<a href="' + f.url + '" target="_blank">' + f.name + '</a>' : f.name;
    h += '<tr><td>' + link + '</td><td>' + f.amount + '</td><td>' + f.eligibility + '</td><td>' + f.covers + '</td><td>' + f.deadline + '</td><td>' + f.notes + '</td></tr>';
    count++;
  }
  h += '</table>';
  if(count === 0) h = '<p>No matching funding sources found.</p>';
  el("fund-results").innerHTML = h;
}

/* ---------- TAB 3: NETWORKING TOOLKIT ---------- */
function buildNetworking(){
  var h = '<div class="card"><h2>Networking Strategies for Introverts (and Everyone Else)</h2>';
  h += '<p>Networking is often the most anxiety-inducing part of conferences, especially for PhD students. The key insight is that networking is not about self-promotion; it is about genuine intellectual exchange.</p>';

  h += '<h3>Before the Conference</h3>';
  h += '<p>Preparation eliminates most networking anxiety. Identify 5-8 scholars whose work connects to yours. Read at least one recent piece from each. Prepare a 30-second "research elevator pitch" using the template below. Check the program for their panels and plan to attend. Draft a brief, specific email to send afterward.</p>';

  h += '<h3>The Research Elevator Pitch</h3>';
  h += '<p>Fill in the template below to craft your pitch. Practice it until it feels natural, not rehearsed.</p>';
  h += '<label>Your name and institution:</label><input type="text" id="net-name" placeholder="e.g., I am [Name], a PhD candidate at EMU">';
  h += '<label>Your broad topic (one sentence):</label><input type="text" id="net-topic" placeholder="e.g., I study the domestic politics of alliance commitments in NATO">';
  h += '<label>Your specific puzzle or question:</label><input type="text" id="net-puzzle" placeholder="e.g., I am trying to understand why some allies increase burden-sharing after threats while others free-ride">';
  h += '<label>Your approach (one sentence):</label><input type="text" id="net-approach" placeholder="e.g., I use comparative case studies of three NATO members using process tracing">';
  h += '<label>Why it matters:</label><input type="text" id="net-matters" placeholder="e.g., This speaks to debates about alliance credibility and the future of collective security">';
  h += '<button class="btn" onclick="generatePitch()">Generate Pitch</button>';
  h += '<div id="pitch-output"></div>';

  h += '<h3>At the Conference</h3>';
  h += '<p>Ask questions after panels (this is the single best way to make yourself visible). Approach speakers after their panel with a specific comment about their paper, not a generic compliment. Attend social events even briefly. Sit next to someone new at meals.</p>';

  h += '<h3>After the Conference</h3>';
  h += '<p>Send follow-up emails within one week. Be specific: reference their paper, your conversation, and any follow-up you discussed. Connect on Google Scholar or ORCID, not just social media. Share your paper if promised.</p>';

  h += '<h3>Follow-Up Email Template</h3>';

/* ---------- TAB 4: ARTICLE PUBLISHING GUIDE ---------- */
function buildPublishing(){
  var h = '<div class="card"><h2>Publishing Your First Article: A Strategic Guide</h2>';
  h += '<p>Publishing during your PhD is increasingly expected in political science and IR. This guide walks you through the process from idea to publication, drawing on established advice from scholars like Gary King and the norms of the discipline.</p>';

  h += '<h3>The Replication-to-Publication Path (Gary King)</h3>';
  h += '<p>Gary King\'s influential article "Publication, Publication" (PS: Political Science and Politics, 2006) outlines a proven path: begin with the replication of a previously published article, then extend it. This approach works because it gives you real data, a clear research question, an established literature, and a baseline against which your contribution is measured. Key principles from King:</p>';
  h += '<p>(1) Choose an article from a good journal so your extension has a chance at publication in that journal or one level below. (2) Focus your paper on what others will learn, not on how hard you worked. Start your abstract with "In this paper, we demonstrate that..." (3) Your section headings alone should convey the entire argument. (4) Before writing, ask: "Whose mind am I going to change about what?"</p>';

  h += '<h3>The Peer Review Process</h3>';
  h += '<p>Understanding what happens after you click "submit" reduces anxiety and helps you prepare better manuscripts.</p>';
  h += '<table><tr><th>Stage</th><th>Duration</th><th>What Happens</th><th>Your Role</th></tr>';
  h += '<tr><td>Desk Review</td><td>1-4 weeks</td><td>Editor assesses fit, quality, and scope. ~40-60% of submissions are desk-rejected.</td><td>Ensure your paper clearly matches the journal\'s scope. A strong abstract and introduction are critical.</td></tr>';
  h += '<tr><td>Peer Review</td><td>2-6 months</td><td>2-3 anonymous reviewers evaluate originality, rigor, contribution. They recommend accept, revise, or reject.</td><td>Wait patiently. Do not contact the editor unless 4+ months pass without communication.</td></tr>';
  h += '<tr><td>Decision</td><td>After review</td><td>Editor sends decision: accept (rare on first round), revise and resubmit (R&R, the goal), or reject.</td><td>Read all feedback carefully. An R&R is good news. A rejection with detailed reviews is still useful.</td></tr>';
  h += '<tr><td>Revision</td><td>1-3 months (deadline varies)</td><td>You revise in response to all reviewer comments. Submit a point-by-point response letter.</td><td>Address every comment, even those you disagree with. Explain your reasoning respectfully.</td></tr>';
  h += '<tr><td>Publication</td><td>2-6 months after acceptance</td><td>Copyediting, proofs, online-first, then print.</td><td>Review proofs carefully. Celebrate.</td></tr>';
  h += '</table>';

  h += '<h3>Journal Selection Tool</h3>';
  h += '<p>Use the filters below to identify appropriate journals for your work.</p>';
  h += '<label>Tier:</label><select id="j-tier" onchange="filterJournals()"><option value="all">Any tier</option><option value="Top">Top tier</option><option value="A">A tier</option><option value="B">B tier</option></select>';
  h += '<label>Field:</label><select id="j-field" onchange="filterJournals()"><option value="all">Any field</option><option value="IR">IR</option><option value="Security">Security</option><option value="IPE">IPE</option><option value="Comparative">Comparative</option><option value="General">General PoliSci</option><option value="Development">Development</option><option value="Policy">Policy</option></select>';
  h += '<label>Methodological style:</label><select id="j-style" onchange="filterJournals()"><option value="all">Any</option><option value="positivist">Positivist/quantitative</option><option value="pluralist">Pluralist/multi-method</option><option value="critical">Critical/interpretivist</option></select>';
  h += '<div id="j-results"></div>';

  h += '<h3>Common Mistakes to Avoid</h3>';
  h += '<p>(1) Submitting to the wrong journal: if your paper is interpretivist, do not send it to a journal known for quantitative rigor. (2) Simultaneous submission: never submit the same paper to two journals at once; this is a serious ethical violation. (3) Ignoring reviewer feedback: even in a rejection, reviewers often identify real weaknesses. (4) Waiting until your dissertation is "perfect" before extracting an article: start converting chapters early. (5) Not reading the journal: always read 5-10 recent articles from any journal you target to understand its style and expectations.</p>';

  h += '<h3>Writing Tips for First-Time Authors</h3>';
  h += '<p>Write the introduction last (after you know what your paper actually argues). Make your contribution explicit in the first two paragraphs. Use signposting ("This article argues that... It proceeds in four sections..."). Keep literature reviews analytical, not encyclopedic: organize by argument, not by author. Every paragraph should make exactly one point.</p>';
  h += '</div>';

  h += '<div class="card"><h2>Key IR Journals: Quick Reference</h2>';
  h += '<div id="journal-table"></div></div>';
  return h;
}

function filterJournals(){
  var tier = el("j-tier").value;
  var field = el("j-field").value;
  var style = el("j-style").value;
  var h = '<table><tr><th>Journal</th><th>Tier</th><th>Field</th><th>Review Time</th><th>Accept Rate</th><th>Style</th><th>Notes</th></tr>';
  var count = 0;
  for(var i=0; i<JOURNALS.length; i++){
    var j = JOURNALS[i];
    if(tier !== "all" && j.tier.indexOf(tier) === -1) continue;
    if(field !== "all" && j.field.indexOf(field) === -1) continue;
    if(style !== "all"){
      var jstyle = j.style.toLowerCase();
      if(style === "positivist" && jstyle.indexOf("positivist") === -1 && jstyle.indexOf("quantitative") === -1) continue;
      if(style === "pluralist" && jstyle.indexOf("pluralist") === -1 && jstyle.indexOf("multi") === -1 && jstyle.indexOf("diverse") === -1) continue;
      if(style === "critical" && jstyle.indexOf("critical") === -1 && jstyle.indexOf("heterodox") === -1 && jstyle.indexOf("interpretivist") === -1 && jstyle.indexOf("british") === -1 && jstyle.indexOf("global south") === -1) continue;
    }
    h += '<tr><td>' + j.name + '</td><td><span class="tag ' + (j.tier === "Top" ? "tag-green" : j.tier === "A" || j.tier === "Top/A" || j.tier === "A/B" ? "tag-blue" : "tag-yellow") + '">' + j.tier + '</span></td><td>' + j.field + '</td><td>' + j.review + '</td><td>' + j.accept + '</td><td>' + j.style + '</td><td>' + j.notes + '</td></tr>';
    count++;
  }
  h += '</table>';
  if(count === 0) h = '<p>No journals match your filters. Try broadening your criteria.</p>';
  el("j-results").innerHTML = h;
}

/* ---------- TAB 5: GRANT WRITING GUIDE ---------- */
function buildGrants(){
  var h = '<div class="card"><h2>Grant Writing for PhD Students</h2>';
  h += '<p>Writing grants is a skill you will use throughout your academic career. Starting during your PhD, even for small amounts, builds your capacity and CV simultaneously. The principles below apply whether you are applying for GBP 500 in conference travel or EUR 100,000 in research funding.</p>';

  h += '<h3>Why Write Grants as a PhD Student?</h3>';
  h += '<p>Grant writing forces you to articulate your research clearly, justify your methods, and think about feasibility. Even unsuccessful applications sharpen your thinking. Funded grants signal to hiring committees that external bodies have validated your research. In many European and Turkish systems, a track record of funding is essential for career progression.</p>';

  h += '<h3>Anatomy of a Strong Proposal</h3>';
  h += '<table><tr><th>Section</th><th>Purpose</th><th>Common Mistakes</th><th>Tips</th></tr>';
  h += '<tr><td>Title and Abstract</td><td>First impression; determines whether reviewers engage seriously</td><td>Too vague, too long, jargon-heavy</td><td>Be specific and compelling. "Explaining Alliance Burden-Sharing Variation in NATO After 2014" is better than "A Study of International Security."</td></tr>';
  h += '<tr><td>Problem Statement / Research Question</td><td>Establishes the puzzle and why it matters</td><td>Describing a topic rather than a question; no clear gap</td><td>State the question explicitly. Explain what we do not yet know and why that gap matters for scholarship or policy.</td></tr>';
  h += '<tr><td>Literature Review / State of the Art</td><td>Shows you know the field and identifies the gap your project fills</td><td>Encyclopedic listing; not connecting the gap to your contribution</td><td>Organize by argument, not chronologically. End with a clear statement of what your project adds.</td></tr>';
  h += '<tr><td>Theoretical Framework</td><td>Presents the concepts and logic guiding your analysis</td><td>Choosing a theory without justifying why; misalignment with epistemology</td><td>Be explicit about your ontological and epistemological commitments if the funder values this (common in European grants).</td></tr>';
  h += '<tr><td>Research Design and Methods</td><td>Explains how you will answer the question</td><td>Methods not justified; no discussion of case selection logic; no feasibility</td><td>Explain why your method fits your question. If qualitative, justify case selection (see KKV, George and Bennett). If quantitative, discuss data sources and techniques.</td></tr>';
  h += '<tr><td>Timeline and Work Plan</td><td>Demonstrates feasibility</td><td>Unrealistic timelines; no milestones</td><td>Be honest about what is achievable. Include specific milestones and deliverables.</td></tr>';
  h += '<tr><td>Budget</td><td>Justifies costs</td><td>Padding the budget; unexplained line items; forgetting indirect costs</td><td>Every line item should connect to a research activity. Explain why each cost is necessary.</td></tr>';
  h += '<tr><td>Impact / Broader Significance</td><td>Explains who benefits and how</td><td>Vague claims about "contributing to knowledge"</td><td>Be specific: publications, policy briefs, datasets, training outcomes.</td></tr>';
  h += '</table>';

  h += '<h3>Grant Opportunities for IR PhD Students</h3>';
  h += '<p>The Funding Tracker tab has a full directory. Key opportunities include:</p>';
  h += '<p><strong>ECPR Grants (up to GBP 500):</strong> Event participation. As an EMU student, you are eligible. Apply early each cycle via ecpr.eu/Funding.</p>';
  h += '<p><strong>TUBITAK 2214-A:</strong> International research fellowship for PhD students enrolled in Turkey. Covers living expenses, travel, and insurance for 3-12 months abroad. Excellent for fieldwork or archival research.</p>';
  h += '<p><strong>TUBITAK 2211:</strong> National PhD scholarship providing a monthly stipend. This frees other funds for conference travel and research costs.</p>';
  h += '<p><strong>TUBITAK 3005:</strong> Research project funding for social sciences and humanities (up to TRY 450,000). Typically for supervisors/teams but can include PhD student support.</p>';
  h += '<p><strong>NSF DDRIG:</strong> US-specific but the model for dissertation research grants globally. Understand its structure even if you cannot apply directly.</p>';
  h += '<p><strong>EU Marie Sklodowska-Curie Actions:</strong> Postdoctoral fellowships with generous funding. Plan for this after your PhD, but understand the system now.</p>';

  h += '<h3>Grant Proposal Outline Generator</h3>';
  h += '<p>Fill in the fields below to generate a structured outline for your next grant application.</p>';
  h += '<label>Grant/funder name:</label><input type="text" id="grant-funder" placeholder="e.g., ECPR Event Participant Grant">';
  h += '<label>Project title:</label><input type="text" id="grant-title" placeholder="e.g., Explaining Alliance Burden-Sharing in NATO">';
  h += '<label>Research question:</label><textarea id="grant-question" placeholder="State your question clearly"></textarea>';
  h += '<label>Why does this matter? (1-2 sentences):</label><textarea id="grant-significance" placeholder="Scholarly and/or policy significance"></textarea>';
  h += '<label>Proposed method:</label><input type="text" id="grant-method" placeholder="e.g., Comparative case study with process tracing">';
  h += '<label>Amount requested:</label><input type="text" id="grant-amount" placeholder="e.g., GBP 500">';
  h += '<label>What the funds cover:</label><input type="text" id="grant-covers" placeholder="e.g., Conference registration, return flight, 3 nights accommodation">';
  h += '<label>Timeline:</label><input type="text" id="grant-timeline" placeholder="e.g., September 2026">';
  h += '<button class="btn" onclick="generateGrant()">Generate Outline</button>';
  h += '<div id="grant-output"></div>';
  h += '</div>';

  h += '<div class="card"><h2>Writing a Grant: Style and Strategy</h2>';
  h += '<p><strong>Write for a busy, intelligent non-specialist.</strong> Grant reviewers may not be in your exact subfield. Avoid unexplained jargon. Define key terms. Make your argument self-contained.</p>';
  h += '<p><strong>Front-load your contribution.</strong> In the first paragraph, state what you will do, why it matters, and what the expected outcome is. Do not make reviewers read three pages before understanding your project.</p>';
  h += '<p><strong>Be specific about everything.</strong> "I will conduct interviews" is weak. "I will conduct 15-20 semi-structured interviews with current and former NATO officials in Brussels and Ankara between January and March 2027" is strong.</p>';
  h += '<p><strong>Align your epistemology, theory, and methods.</strong> This is where the Research Design Toolkit (your other app) directly supports grant writing. A grant that claims to use constructivist theory but proposes regression analysis will confuse reviewers.</p>';
  h += '<p><strong>Get feedback before submitting.</strong> Ask your supervisor, a colleague, and ideally someone outside your subfield to read your proposal. If they cannot summarize your project in two sentences after reading it, rewrite your introduction.</p>';
  h += '</div>';
  return h;
}

/* ---------- TAB 6: ABSTRACT BUILDER ---------- */
function buildAbstract(){
  var h = '<div class="card"><h2>Conference Abstract Builder</h2>';
  h += '<p>A strong abstract is the single most important factor in getting your paper accepted to a conference. Most IR conferences require 200-300 word abstracts. Use the structured approach below.</p>';

  h += '<h3>The Four-Sentence Abstract (for conference submissions)</h3>';
  h += '<p>Following the logic of King\'s "Publication, Publication" and standard disciplinary practice, a strong abstract answers four questions in order:</p>';

  h += '<label><strong>1. What is the puzzle or question?</strong> (The gap or debate your paper addresses)</label>';
  h += '<textarea id="abs-puzzle" placeholder="e.g., Despite decades of alliance theory, we lack a compelling explanation for why some NATO allies increased defense spending after the 2014 Ukraine crisis while others did not."></textarea>';

  h += '<label><strong>2. What does this paper argue?</strong> (Your thesis or contribution)</label>';
  h += '<textarea id="abs-argument" placeholder="e.g., This paper argues that domestic partisan composition, not threat perception, best explains variation in post-2014 burden-sharing behavior."></textarea>';

  h += '<label><strong>3. How do you demonstrate this?</strong> (Your method and evidence)</label>';
  h += '<textarea id="abs-method" placeholder="e.g., Using comparative case studies of Germany, Poland, and Turkey with process tracing and original interview data, I test competing explanations drawn from realist, liberal, and constructivist theory."></textarea>';

  h += '<label><strong>4. What do we learn?</strong> (Implications and significance)</label>';
  h += '<textarea id="abs-implications" placeholder="e.g., The findings challenge purely structural accounts of alliance behavior and suggest that understanding domestic coalition politics is essential for predicting future NATO cohesion."></textarea>';

  h += '<button class="btn" onclick="generateAbstract()">Generate Abstract</button>';
  h += '<div id="abs-output"></div>';

  h += '<h3>Abstract Checklist</h3>';
  var checks = [
    "Does it state a clear question or puzzle (not just a topic)?",
    "Does it make an argument (not just promise to 'explore' or 'examine')?",
    "Does it specify the method and evidence?",
    "Does it state the contribution or implications?",
    "Is it under 300 words (or whatever the conference requires)?",
    "Does it avoid jargon that a generalist IR scholar would not understand?",
    "Does it avoid first-person language where the conference norms prefer third-person?",
    "Would a reader know exactly what the paper argues after reading only the abstract?"
  ];
  for(var i=0; i<checks.length; i++){
    h += '<div class="checklist-item"><label><input type="checkbox"> ' + checks[i] + '</label></div>';
  }
  h += '</div>';

  h += '<div class="card"><h2>Article Abstract Builder</h2>';
  h += '<p>Journal abstracts follow the same logic but are often more precise. Many journals require structured abstracts with specific headings. Use the form above for a general abstract or modify it to include: Background, Objective, Methods, Findings, Conclusions.</p></div>';
  return h;
}

function generateAbstract(){
  var puzzle = el("abs-puzzle").value || "[State your puzzle]";
  var argument = el("abs-argument").value || "[State your argument]";
  var method = el("abs-method").value || "[Describe your method]";
  var implications = el("abs-implications").value || "[State implications]";
  var abstract = puzzle + " " + argument + " " + method + " " + implications;
  var words = abstract.split(/\s+/).length;
  var wordWarning = "";
  if(words > 300) wordWarning = "\n\n[WARNING: " + words + " words. Most conferences require 200-300 words. Consider trimming.]";
  if(words < 100) wordWarning = "\n\n[NOTE: " + words + " words. Your abstract may be too short. Consider expanding.]";
  el("abs-output").innerHTML = '<div class="result-box">' + abstract + wordWarning + '\n\nWord count: ' + words + '</div><button class="btn btn-secondary" onclick="copyText(\'abs-output\')">Copy to Clipboard</button>';
}

/* ---------- TAB 7: PROFILE CHECKLIST ---------- */
function buildProfile(){

    {name:"ORCID iD", why:"Persistent digital identifier that links you to all your publications across systems. Required by many journals and funders.", action:"Register at orcid.org. Add your education, employment, and works. Link to your Google Scholar and institutional page.", priority:"Essential"},
    {name:"Institutional Profile Page", why:"Your department page is often the first result when someone searches your name. Ensure it is accurate.", action:"Contact your department to update your profile with current research interests, publications, and contact information.", priority:"Essential"},
    {name:"Personal Academic Website (via GitHub Pages)", why:"Full control over your presentation. Can host your CV, working papers, blog, teaching materials.", action:"Create a GitHub repository, use a simple template or Jekyll, and publish. You are already learning this with the INTL698 site.", priority:"Highly Recommended"},
    {name:"ResearchGate", why:"Social network for academics. Good for sharing papers and tracking reads/citations. Some scholars use it actively.", action:"Create a profile. Upload preprints and published papers (check copyright). Follow scholars in your field.", priority:"Recommended"},
    {name:"Academia.edu", why:"Similar to ResearchGate but with a larger humanities/social science user base.", action:"Create a profile. Same as ResearchGate. Note: some features require paid subscription.", priority:"Optional"},
    {name:"Twitter/X (Academic Twitter)", why:"Real-time scholarly conversation, conference live-tweeting, sharing new publications. Increasingly important but also increasingly chaotic.", action:"If you use it, keep it professional. Share your work, engage with others' research, follow key scholars and journals in your field.", priority:"Optional"},
    {name:"Departmental and University Newsletters", why:"Internal visibility matters too. Your colleagues and administration should know about your achievements.", action:"Send your supervisor and department a brief note when you publish, present, or receive funding.", priority:"Recommended"}
  ];

  for(var i=0; i<profiles.length; i++){
    var p = profiles[i];
    var prClass = p.priority === "Essential" ? "tag-green" : p.priority === "Highly Recommended" ? "tag-blue" : p.priority === "Recommended" ? "tag-yellow" : "tag-purple";
    h += '<div class="checklist-item"><label><input type="checkbox" id="prof-' + i + '"> <strong>' + p.name + '</strong> <span class="tag ' + prClass + '">' + p.priority + '</span></label>';
    h += '<p style="margin:4px 0 4px 28px;font-size:0.9em;"><em>Why:</em> ' + p.why + '</p>';
    h += '<p style="margin:0 0 0 28px;font-size:0.9em;"><em>Action:</em> ' + p.action + '</p></div>';
  }

  h += '<div style="margin-top:16px;"><button class="btn" onclick="checkProfileProgress()">Check My Progress</button></div>';
  h += '<div id="profile-progress"></div>';
  h += '</div>';
  return h;
}

function checkProfileProgress(){
  var total = 8;
  var done = 0;
  for(var i=0; i<total; i++){
    if(el("prof-" + i) && el("prof-" + i).checked) done++;
  }
  var pct = Math.round((done/total)*100);
  var color = pct < 40 ? "#dc3545" : pct < 70 ? "#ffc107" : "#28a745";
  var h = '<div style="margin-top:12px;"><strong>Profile Completeness: ' + pct + '% (' + done + '/' + total + ')</strong>';
  h += '<div style="background:#eee;border-radius:10px;height:20px;margin-top:6px;"><div class="score-bar" style="width:' + pct + '%;background:' + color + ';"></div></div>';
  if(pct < 40) h += '<p style="color:#dc3545;margin-top:8px;">You have significant gaps in your online academic presence. Prioritize the Essential items this week.</p>';
  else if(pct < 70) h += '<p style="color:#856404;margin-top:8px;">Good progress. Complete the Essential and Highly Recommended items before your next conference.</p>';
  else h += '<p style="color:#155724;margin-top:8px;">Strong academic profile. Keep everything updated, especially after new publications or presentations.</p>';
  h += '</div>';
  el("profile-progress").innerHTML = h;
}

function savePlan(){
  el("plan-output").innerHTML = '<div class="tip-box">Plan saved for this session. Use "Export as Text" to copy and keep a permanent record.</div>';
}

function exportPlan(){
  var year = el("plan-year").value;
  var text = "PHD PROFESSIONAL DEVELOPMENT PLAN\n";
  text += "==================================\n\n";
  text += "Current Stage: " + year + "\n\n";
  text += "CONFERENCES:\n" + (el("plan-confs").value || "[None entered]") + "\n\n";
  text += "FUNDING APPLICATIONS:\n" + (el("plan-funds").value || "[None entered]") + "\n\n";
  text += "PUBLISHING GOALS:\n" + (el("plan-pubs").value || "[None entered]") + "\n\n";
  text += "SKILLS DEVELOPMENT:\n" + (el("plan-skills").value || "[None entered]") + "\n\n";
  text += "OTHER GOALS:\n" + (el("plan-other").value || "[None entered]") + "\n";
  el("plan-output").innerHTML = '<div class="result-box">' + text + '</div><button class="btn btn-secondary" onclick="copyText(\'plan-output\')">Copy to Clipboard</button>';
}

/* ---------- UTILITY ---------- */
function copyText(containerId){
  var box = el(containerId);
  if(!box) return;
  var resultDiv = box.querySelector(".result-box");
  if(!resultDiv) return;
  var text = resultDiv.innerText || resultDiv.textContent;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      alert("Copied to clipboard.");
    });
  } else {
    var ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    alert("Copied to clipboard.");
  }
}

function toggleExpand(id){
  var body = el(id);
  if(!body) return;
  if(body.className.indexOf("open") > -1){
    body.className = "expandable-body";
  } else {
    body.className = "expandable-body open";
  }
}

  showTab("conferences");

  setTimeout(function(){
    if(el("fund-search")) filterFunding();
    if(el("j-results")) filterJournals();
    if(el("conf-results")) filterConfs();
  }, 100);
}

init();
